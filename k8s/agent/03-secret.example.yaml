# TEMPLATE ONLY - do NOT put real secrets in this file or commit them.
#
# Create the real Secret imperatively so it never lands in git:
#
#   kubectl create secret generic incident-agent-secrets \
#     -n ai-agent \
#     --from-literal=LLM_API_KEY='<your-rotated-api-key>' \
#     --from-literal=SMTP_PASSWORD='<smtp-password-or-empty>'
#
# (SMTP_PASSWORD can be empty if your relay allows unauthenticated internal relay.)
apiVersion: v1
kind: Secret
metadata:
  name: incident-agent-secrets
  namespace: ai-agent
type: Opaque
stringData:
  LLM_API_KEY: "REPLACE_ME"
  SMTP_PASSWORD: ""
