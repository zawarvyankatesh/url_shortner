apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-agent
  namespace: ai-agent
  labels:
    app: incident-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: incident-agent
  template:
    metadata:
      labels:
        app: incident-agent
    spec:
      serviceAccountName: incident-agent
      containers:
        - name: incident-agent
          image: vyankateshzawar/incident-agent:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: incident-agent-config
            - secretRef:
                name: incident-agent-secrets
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: incident-agent
  namespace: ai-agent
  labels:
    app: incident-agent
spec:
  selector:
    app: incident-agent
  ports:
    - name: http
      port: 8080
      targetPort: http
  type: ClusterIP
