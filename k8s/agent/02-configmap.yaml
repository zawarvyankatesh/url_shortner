# Non-secret agent configuration. Secrets (LLM_API_KEY, SMTP_PASSWORD) live in a
# separate Kubernetes Secret created imperatively - see SECRET_SETUP.md.
apiVersion: v1
kind: ConfigMap
metadata:
  name: incident-agent-config
  namespace: ai-agent
data:
  PROMETHEUS_URL: "http://prometheus.monitoring.svc:9090"

  # Your Azure OpenAI-compatible LLM proxy endpoint.
  LLM_ENDPOINT: "https://llm-proxy.internal:8085"
  LLM_API_VERSION: "2024-02-15-preview"
  LLM_MODEL: "gpt-4.1"
  # Caller identity sent to the proxy (X-Effective-Caller header).
  LLM_NTNET_USER: "user@example.com"
  LLM_VERIFY_SSL: "false"

  # Email recipient / sender for the incident reports.
  MAIL_TO: "oncall@example.com"
  MAIL_FROM: "incident-agent@example.com"
  # Internal SMTP relay. Pod egress is SNATed to the node IP, so if the relay
  # trusts the node it needs no auth/TLS.
  SMTP_HOST: "smtp-relay.internal"
  SMTP_PORT: "25"
  SMTP_USE_TLS: "false"

  LOG_LEVEL: "INFO"
