# Alertmanager configuration. It receives fired alerts from Prometheus,
# groups/deduplicates them, and routes them to a "receiver". For now the
# receiver is a webhook echo service so you can SEE the alert payload. In a
# later phase this webhook URL becomes our AI incident-analysis agent.
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      # group alerts of the same type/namespace into one notification
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 1h
      receiver: "webhook-receiver"

    receivers:
      - name: "webhook-receiver"
        webhook_configs:
          - url: "http://alert-receiver.monitoring.svc:8080/"
            send_resolved: true
