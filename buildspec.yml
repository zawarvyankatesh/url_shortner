version: 0.2

# NOTE: The CodeBuild project must have "Privileged" mode enabled so Docker
# commands can run (Project settings -> Environment -> Enable "Privileged").

env:
  variables:
    # Docker Hub repository names. Full ref becomes:
    #   $DOCKER_REGISTRY_URL/$DOCKER_REGISTRY_USERNAME/<name>
    IMAGE_NAME: "url-shortener"
    AGENT_IMAGE_NAME: "incident-agent"
  parameter-store:
    DOCKER_REGISTRY_USERNAME: /myapp/docker-credentials/username
    DOCKER_REGISTRY_PASSWORD: /myapp/docker-credentials/password
    DOCKER_REGISTRY_URL: /myapp/docker-registry/url

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - echo "Installing dependencies..."
      - pip install -r requirements-dev.txt

  pre_build:
    commands:
      - echo "Running tests..."
      - pytest -q
      - echo "Logging in to Docker registry..."
      - echo "$DOCKER_REGISTRY_PASSWORD" | docker login -u "$DOCKER_REGISTRY_USERNAME" --password-stdin "$DOCKER_REGISTRY_URL"
      # Short git commit SHA as an immutable tag (falls back to "latest").
      - COMMIT_SHA="${CODEBUILD_RESOLVED_SOURCE_VERSION:-latest}"
      - IMAGE_TAG="${COMMIT_SHA:0:7}"
      - IMAGE_REPO="$DOCKER_REGISTRY_URL/$DOCKER_REGISTRY_USERNAME/$IMAGE_NAME"
      - AGENT_REPO="$DOCKER_REGISTRY_URL/$DOCKER_REGISTRY_USERNAME/$AGENT_IMAGE_NAME"
      - echo "App image   -> $IMAGE_REPO (tags:latest,$IMAGE_TAG)"
      - echo "Agent image -> $AGENT_REPO (tags:latest,$IMAGE_TAG)"

  build:
    commands:
      - echo "Building url-shortener image..."
      - docker build -t "$IMAGE_REPO:latest" -t "$IMAGE_REPO:$IMAGE_TAG" .
      - echo "Building incident-agent image..."
      - docker build -t "$AGENT_REPO:latest" -t "$AGENT_REPO:$IMAGE_TAG" ./agent

  post_build:
    commands:
      - echo "Pushing url-shortener image..."
      - docker push "$IMAGE_REPO:latest"
      - docker push "$IMAGE_REPO:$IMAGE_TAG"
      - echo "Pushing incident-agent image..."
      - docker push "$AGENT_REPO:latest"
      - docker push "$AGENT_REPO:$IMAGE_TAG"
      - echo "Build completed. Pushed both images (latest and $IMAGE_TAG)."
